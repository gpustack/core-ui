name: CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Ensure npm supports Trusted Publishers (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${PKG_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts

  bump-gpustack-ui:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gpustack-ui
        uses: actions/checkout@v4
        with:
          repository: gpustack/gpustack-ui
          token: ${{ secrets.GPUSTACK_UI_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.3.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Bump @gpustack/core-ui
        env:
          TAG: ${{ github.ref_name }}
        run: |
          v="${TAG#v}"
          for i in 1 2 3 4 5; do
            if pnpm add @gpustack/core-ui@${v} --save-prod --ignore-scripts; then
              exit 0
            fi
            echo "npm registry not ready yet, retry $i..."
            sleep 20
          done
          exit 1

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GPUSTACK_UI_PAT }}
          base: main
          branch: chore/bump-core-ui-${{ github.ref_name }}
          delete-branch: true
          title: "chore: bump @gpustack/core-ui to ${{ github.ref_name }}"
          commit-message: "chore: bump @gpustack/core-ui to ${{ github.ref_name }}"
          body: |
            Automated bump from [@gpustack/core-ui ${{ github.ref_name }}](https://github.com/gpustack/core-ui/releases/tag/${{ github.ref_name }}).
